name: Deploy to GitHub Pages

on:
  push:
    tags:
      - '*'
    branches:
      - main
  workflow_run:
    workflows:
      - "Scheduled BOE Audit 00"
      - "Scheduled BOE Audit 01"
      - "Scheduled BOE Audit 02"
      - "Scheduled BOE Audit 03"
      - "Scheduled BOE Audit 04"
      - "Scheduled BOE Audit 05"
      - "Scheduled BOE Audit 06"
      - "Scheduled BOE Audit 07"
      - "Scheduled BOE Audit 08"
      - "Scheduled BOE Audit 09"
      - "Scheduled BOE Audit 10"
      - "Scheduled BOE Audit 11"
      - "Scheduled BOE Audit 12"
      - "Scheduled BOE Audit 13"
      - "Scheduled BOE Audit 14"
      - "Scheduled BOE Audit 15"
      - "Scheduled BOE Audit 16"
      - "Scheduled BOE Audit 17"
      - "Scheduled BOE Audit 18"
      - "Scheduled BOE Audit 19"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run sitemap
          npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          token: ${{ secrets.GITHUB_TOKEN }}
