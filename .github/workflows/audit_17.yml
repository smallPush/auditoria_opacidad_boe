name: Scheduled BOE Audit 17

on:
  schedule:
    - cron: '17 0,12 * * *' # Every 12 hours staggered at minute 17
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of items to audit'
        required: false
        default: '1'
      date:
        description: 'Specific date to audit (YYYYMMDD)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm ci

      - name: Run Audit 🤖
        run: |
          ARGS="--offset 17 --limit 1"
          if [ "${{ github.event.inputs.limit }}" != "" ]; then ARGS="--offset 17 --limit ${{ github.event.inputs.limit }}"; fi
          if [ "${{ github.event.inputs.date }}" != "" ]; then ARGS="$ARGS --date ${{ github.event.inputs.date }}"; fi
          npm run audit -- $ARGS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_CLIENT_ID: ${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET: ${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_REFRESH_TOKEN: ${{ secrets.TWITTER_REFRESH_TOKEN }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}

      - name: Commit and Push changes 🚀
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audited_reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update audited reports (offset 17) [skip ci]"
            # Pull with rebase to handle concurrent commits, retry up to 3 times
            n=0
            until [ "$n" -ge 3 ]
            do
               git pull --rebase --autostash origin main && git push && break
               n=$((n+1))
               echo "Git push failed, retrying in 5 seconds..."
               sleep 5
            done
          fi
